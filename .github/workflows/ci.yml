name: Go CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Verify Go toolchain
        run: go version

      - name: Verify module metadata
        run: go list -m

      - name: Run unit tests
        run: make test

      - name: Run snapshot adapter tests
        run: go test ./internal/core ./internal/adapters/snapshot

  fixtures:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Verify fixture script prerequisites
        run: |
          git --version
          jq --version
          rg --version

      - name: Prepare fixtures (retry once for transient network failures)
        run: |
          for attempt in 1 2; do
            if bash scripts/fixtures_prepare.sh; then
              exit 0
            fi

            if [[ "${attempt}" -eq 2 ]]; then
              echo "Fixture preparation failed after retry." >&2
              exit 1
            fi

            echo "Fixture preparation failed on attempt ${attempt}; retrying..."
            rm -rf .fixtures
            sleep 5
          done

      - name: Verify prepared fixtures
        run: bash scripts/fixtures_verify.sh

      - name: Run fixture E2E tests
        run: go test ./internal/e2e/fixtures -v

  build-binaries:
    runs-on: ubuntu-latest
    needs:
      - verify
      - fixtures
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Resolve build metadata
        run: |
          VERSION="v0.0.1"
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            VERSION="${GITHUB_REF_NAME}"
          fi

          COMMIT="${GITHUB_SHA::7}"
          DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          echo "BUILD_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "BUILD_COMMIT=${COMMIT}" >> "$GITHUB_ENV"
          echo "BUILD_DATE=${DATE}" >> "$GITHUB_ENV"

      - name: Build concierge binary
        run: |
          mkdir -p dist
          LDFLAGS="-s -w \
            -X github.com/tensorleap/concierge/internal/buildinfo.Version=${BUILD_VERSION} \
            -X github.com/tensorleap/concierge/internal/buildinfo.Commit=${BUILD_COMMIT} \
            -X github.com/tensorleap/concierge/internal/buildinfo.Date=${BUILD_DATE}"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build \
            -ldflags "$LDFLAGS" \
            -o dist/concierge-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/concierge

      - name: Smoke test linux amd64 binary
        if: ${{ matrix.goos == 'linux' && matrix.goarch == 'amd64' }}
        run: |
          output="$(./dist/concierge-linux-amd64 version)"
          echo "$output"
          echo "$output" | grep -Fx "Version:     ${BUILD_VERSION}"
          echo "$output" | grep -Fx "Commit:      ${BUILD_COMMIT}"
          echo "$output" | grep -Fx "Build date:  ${BUILD_DATE}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: concierge-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/concierge-${{ matrix.goos }}-${{ matrix.goarch }}
          if-no-files-found: error
