name: Go CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Verify Go toolchain
        run: go version

      - name: Verify module metadata
        run: go list -m

      - name: Run unit tests
        run: go test ./...

  build-binaries:
    runs-on: ubuntu-latest
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Resolve build metadata
        run: |
          VERSION="v0.0.0-dev+${GITHUB_SHA::7}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            VERSION="${GITHUB_REF_NAME}"
          fi

          COMMIT="${GITHUB_SHA::7}"
          DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          echo "BUILD_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "BUILD_COMMIT=${COMMIT}" >> "$GITHUB_ENV"
          echo "BUILD_DATE=${DATE}" >> "$GITHUB_ENV"

      - name: Build concierge binary
        run: |
          mkdir -p dist
          LDFLAGS="-s -w \
            -X github.com/tensorleap/concierge/internal/buildinfo.Version=${BUILD_VERSION} \
            -X github.com/tensorleap/concierge/internal/buildinfo.Commit=${BUILD_COMMIT} \
            -X github.com/tensorleap/concierge/internal/buildinfo.Date=${BUILD_DATE}"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build \
            -ldflags "$LDFLAGS" \
            -o dist/concierge-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/concierge

      - name: Smoke test linux amd64 binary
        if: ${{ matrix.goos == 'linux' && matrix.goarch == 'amd64' }}
        run: |
          output="$(./dist/concierge-linux-amd64 version)"
          echo "$output"
          echo "$output" | grep -Eq '^version: v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'
          echo "$output" | grep -Eq '^commit: [0-9a-f]{7}$'
          echo "$output" | grep -Eq '^date: [0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$'

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: concierge-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/concierge-${{ matrix.goos }}-${{ matrix.goarch }}
          if-no-files-found: error
