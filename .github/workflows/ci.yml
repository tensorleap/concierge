name: Go CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Verify Go toolchain
        run: go version

      - name: Verify module metadata
        run: go list -m

      - name: Run unit tests
        run: go test ./...

  build-binaries:
    runs-on: ubuntu-latest
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Build concierge binary
        run: |
          mkdir -p dist
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build \
            -o dist/concierge-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/concierge

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: concierge-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/concierge-${{ matrix.goos }}-${{ matrix.goarch }}
          if-no-files-found: error
