name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version to release (vX.Y.Z or X.Y.Z). Leave empty to release the selected tag ref."
        required: false
        type: string

permissions:
  contents: write

jobs:
  resolve-release-tag:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      create_tag: ${{ steps.resolve.outputs.create_tag }}
      target_commit: ${{ steps.resolve.outputs.target_commit }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag and target commit
        id: resolve
        run: |
          semver_regex='^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            tag="${GITHUB_REF_NAME}"
            if [[ ! "${tag}" =~ ${semver_regex} ]]; then
              echo "Tag ${tag} is not a valid semantic version (expected vX.Y.Z)." >&2
              exit 1
            fi

            echo "release_tag=${tag}" >> "$GITHUB_OUTPUT"
            echo "create_tag=false" >> "$GITHUB_OUTPUT"
            echo "target_commit=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          input="${{ github.event.inputs.version }}"
          if [[ -z "${input}" ]]; then
            if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
              echo "workflow_dispatch without version requires selecting an existing tag ref." >&2
              exit 1
            fi

            tag="${GITHUB_REF_NAME}"
            if [[ ! "${tag}" =~ ${semver_regex} ]]; then
              echo "Tag ${tag} is not a valid semantic version (expected vX.Y.Z)." >&2
              exit 1
            fi

            echo "release_tag=${tag}" >> "$GITHUB_OUTPUT"
            echo "create_tag=false" >> "$GITHUB_OUTPUT"
            commit="$(git rev-list -n 1 "refs/tags/${tag}")"
            echo "target_commit=${commit}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          normalized="${input#v}"
          tag="v${normalized}"
          if [[ ! "${tag}" =~ ${semver_regex} ]]; then
            echo "Version ${input} is not a valid semantic version (expected vX.Y.Z)." >&2
            exit 1
          fi

          git fetch origin main --tags

          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            git fetch origin "refs/tags/${tag}:refs/tags/${tag}"
            commit="$(git rev-list -n 1 "refs/tags/${tag}")"
            echo "Tag ${tag} already exists on origin; reusing it."
            echo "release_tag=${tag}" >> "$GITHUB_OUTPUT"
            echo "create_tag=false" >> "$GITHUB_OUTPUT"
            echo "target_commit=${commit}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          commit="$(git rev-parse origin/main)"
          echo "release_tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "create_tag=true" >> "$GITHUB_OUTPUT"
          echo "target_commit=${commit}" >> "$GITHUB_OUTPUT"

      - name: Configure git author for tag creation
        if: ${{ steps.resolve.outputs.create_tag == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push release tag
        if: ${{ steps.resolve.outputs.create_tag == 'true' }}
        run: |
          tag="${{ steps.resolve.outputs.release_tag }}"
          commit="${{ steps.resolve.outputs.target_commit }}"
          git tag -a "${tag}" "${commit}" -m "Release ${tag}"
          git push origin "${tag}"

  release:
    runs-on: ubuntu-latest
    needs:
      - resolve-release-tag
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ needs.resolve-release-tag.outputs.release_tag }}

      - name: Validate semantic version tag
        run: |
          tag="${{ needs.resolve-release-tag.outputs.release_tag }}"
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag ${tag} is not a valid semantic version (expected vX.Y.Z)." >&2
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Run tests
        run: go test ./...

      - name: Build and publish release artifacts
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
